# Nginx reverse proxy for persona-chat.
# Install:
#   sudo cp deploy/nginx-persona.conf /etc/nginx/sites-available/persona.abhijitmone.com
#   sudo ln -s /etc/nginx/sites-available/persona.abhijitmone.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see DEPLOY.md) — it rewrites this file to add the TLS block
# and an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name persona.abhijitmone.com;

    # Node/Express serves both the built React app (dist/) and the /api routes.
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # LLM replies can take a while
    }
}
